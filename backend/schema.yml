components:
  schemas:
    ActionEnum:
      enum:
      - ADD
      - EDIT
      - DELETE
      type: string
      description: |-
        * `ADD` - Ajout
        * `EDIT` - Modification
        * `DELETE` - Suppression
    AgriculturalAlert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        alert_type:
          type: string
          maxLength: 50
        message:
          type: string
        recommendation:
          type: string
        severity:
          $ref: '#/components/schemas/AgriculturalAlertSeverityEnum'
        alert_date:
          type: string
          format: date
        is_active:
          type: boolean
        weather_data_id:
          type: integer
          readOnly: true
        parcel_name:
          type: string
          readOnly: true
      required:
      - alert_date
      - alert_type
      - id
      - message
      - parcel_name
      - recommendation
      - severity
      - weather_data_id
    AgriculturalAlertSeverityEnum:
      enum:
      - LOW
      - MEDIUM
      - HIGH
      type: string
      description: |-
        * `LOW` - Faible
        * `MEDIUM` - Moyen
        * `HIGH` - Élevé
    Alert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        parcel:
          type: string
          format: uuid
        parcel_name:
          type: string
          readOnly: true
        type:
          type: string
          maxLength: 100
        message:
          type: string
        severity:
          $ref: '#/components/schemas/AlertSeverityEnum'
        action:
          type: string
        is_read:
          type: boolean
        is_critical:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        alert_date:
          type: string
          format: date
      required:
      - alert_date
      - created_at
      - id
      - is_critical
      - message
      - parcel
      - parcel_name
      - severity
      - type
    AlertRequest:
      type: object
      properties:
        parcel:
          type: string
          format: uuid
        type:
          type: string
          minLength: 1
          maxLength: 100
        message:
          type: string
          minLength: 1
        severity:
          $ref: '#/components/schemas/AlertSeverityEnum'
        action:
          type: string
        is_read:
          type: boolean
        alert_date:
          type: string
          format: date
      required:
      - alert_date
      - message
      - parcel
      - severity
      - type
    AlertSeverityEnum:
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
      type: string
      description: |-
        * `LOW` - Faible
        * `MEDIUM` - Moyenne
        * `HIGH` - Haute
        * `CRITICAL` - Critique
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        items_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - items_count
      - total
      - updated_at
      - user
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cart:
          type: integer
          readOnly: true
        product:
          type: integer
        product_name:
          type: string
          readOnly: true
        product_image:
          type: string
          format: uri
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
