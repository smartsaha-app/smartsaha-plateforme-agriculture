      required:
      - content
      - conversation
    MethodEnum:
      enum:
      - MVOLA
      - ORANGE_MONEY
      - AIRTEL_MONEY
      - STRIPE
      type: string
      description: |-
        * `MVOLA` - MVola
        * `ORANGE_MONEY` - Orange Money
        * `AIRTEL_MONEY` - Airtel Money
        * `STRIPE` - Stripe
    MobileSignupRequest:
      type: object
      description: |-
        Serializer d'inscription mobile.
        Crée un compte INACTIF (is_active=False) qui sera activé
        uniquement après vérification du code OTP envoyé par email.
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          title: Prénom
          maxLength: 150
        last_name:
          type: string
          title: Nom
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 6
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password
      - role
      - username
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order_number:
          type: string
          readOnly: true
          description: e.g., CMD-2024-0001
        buyer:
          type: string
          format: uuid
          readOnly: true
        buyer_details:
          type: object
          additionalProperties: {}
          readOnly: true
        buyer_name:
          type: string
          maxLength: 255
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        delivery_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        status:
          $ref: '#/components/schemas/OrderStatusEnum'
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        payment_status:
          $ref: '#/components/schemas/OrderPaymentStatusEnum'
        delivery_name:
          type: string
          maxLength: 255
        delivery_phone:
          type: string
          maxLength: 50
        delivery_address:
          type: string
        delivery_city:
          type: string
          maxLength: 100
        delivery_region:
          type: string
          maxLength: 100
        delivery_notes:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - buyer
      - buyer_details
      - buyer_name
      - created_at
      - delivery_address
      - delivery_city
      - delivery_name
      - delivery_phone
      - delivery_region
      - id
      - items
      - order_number
      - payment_method
      - subtotal
      - total
      - updated_at
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order:
          type: integer
          readOnly: true
        product:
          type: integer
          readOnly: true
          nullable: true
        seller:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        seller_name:
          type: string
          maxLength: 255
        product_name:
          type: string
          maxLength: 255
        product_image:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
          description: Prix unitaire au moment de la commande (snapshot)
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
